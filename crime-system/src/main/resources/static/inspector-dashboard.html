<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inspector Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            padding: 20px;
        }

        .card {
            background: #1c1c1c;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        select, button {
            margin-top: 10px;
            padding: 8px;
            width: 100%;
        }

        button {
            background: orange;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Inspector Dashboard ⭐</h1>

<div id="complaints"></div>

<script>

    async function loadComplaints() {

        const res = await fetch("http://localhost:8081/api/complaints/all");
        const data = await res.json();

        const container = document.getElementById("complaints");
        container.innerHTML = "";

        data.forEach(c => {

            container.innerHTML += `
                <div class="card">
                    <h3>${c.title}</h3>
                    <p>${c.description}</p>
                    <p>📍 ${c.location}</p>
                    <p>Status: ${c.status}</p>

                    <select id="officer-${c.complaintId}">
                        <option value="2">Sub Inspector 1</option>
                        <option value="3">Sub Inspector 2</option>
                    </select>

                    <button onclick="assignCase(${c.complaintId})">
                        Assign Case
                    </button>
                </div>
            `;
        });
    }

    async function assignCase(complaintId) {

        const officerId = document.getElementById("officer-" + complaintId).value;

        await fetch(`http://localhost:8081/api/complaints/assign?complaintId=${complaintId}&officerId=${officerId}`, {
            method: "POST"
        });

        alert("Case Assigned ✅");
        loadComplaints();
    }

    loadComplaints();

</script>

</body>
</html>
